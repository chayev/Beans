<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.Params.description }}">
    <title>{{ site.Title }}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    {{ block "main" . }}{{ end }}
    
    <footer id="adopt" class="site-footer">
        <div class="container">
            <h2>Ready to Meet Beans?</h2>
            <p>Reach out to discuss fostering or adopting this amazing dog.</p>
            <form action="https://formspree.io/f/xbjnlyyw" method="POST" class="contact-form">
                <!-- Using a placeholder formspree link, user can change later -->
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="_replyto" placeholder="Your Email" required>
                <textarea name="message" placeholder="Tell us a bit about yourself and your home..." required></textarea>
                <button type="submit" class="btn primary-btn">Send Message</button>
            </form>
            <div class="footer-bottom">
                <p>&copy; {{ now.Year }} Adopt Beans (PACC #A861707). All rights reserved.</p>
                <p>Adoptable Dog Pima County</p>
            </div>
        </div>
    </footer>
    <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
